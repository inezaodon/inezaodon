<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rwanda to Notre Dame</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a33;
      --text: #e9eeff;
      --muted: #b7c1e6;
      --accent: #7cd4ff;
      --gold: #ffcf57;
      --route: #6df1b2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1d2958 0%, var(--bg) 50%, #070b17 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.98rem;
    }

    .scene {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #0f1630;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      fill: #dce4ff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .map-shape {
      fill: #24315f;
      stroke: #6174b4;
      stroke-width: 2;
      opacity: 0.92;
    }

    .route-line {
      fill: none;
      stroke: var(--route);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 8 8;
      animation: dash 1.3s linear infinite;
      filter: drop-shadow(0 0 4px rgba(109, 241, 178, 0.7));
    }

    .city-dot {
      fill: var(--gold);
      stroke: #3a2c00;
      stroke-width: 1.5;
    }

    .plane {
      font-size: 22px;
      transform-box: fill-box;
      transform-origin: center;
      animation: fly 7s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(124, 212, 255, 0.6));
    }

    .guy-body {
      fill: #78b4ff;
    }

    .guy-head {
      fill: #ffd7b0;
      stroke: #6f4c2d;
      stroke-width: 1.2;
    }

    .pen {
      fill: #f4f7ff;
      stroke: #3f4b7f;
      stroke-width: 1.2;
    }

    .cta {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(124, 212, 255, 0.55);
      background: rgba(124, 212, 255, 0.08);
      color: #dff6ff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 120ms ease, background 120ms ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      background: rgba(124, 212, 255, 0.16);
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -16;
      }
    }

    @keyframes fly {
      0% {
        transform: translate(0px, 0px) rotate(-10deg);
      }
      45% {
        transform: translate(335px, -70px) rotate(-2deg);
      }
      55% {
        transform: translate(365px, -64px) rotate(2deg);
      }
      100% {
        transform: translate(700px, -24px) rotate(10deg);
      }
    }

    @media (max-width: 720px) {
      .card {
        padding: 18px;
      }
      .subtitle {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>From Rwanda to Notre Dame, Indiana</h1>
    <p class="subtitle">A small animated journey map and a quick way to visit your personal website.</p>

    <div class="scene">
      <svg viewBox="0 0 900 420" aria-labelledby="title desc" role="img">
        <title id="title">Animated route map from Rwanda to Notre Dame</title>
        <desc id="desc">A stylized map with an animated plane and a person holding a pen toward a website link.</desc>

        <rect x="0" y="0" width="900" height="420" fill="#0f1630" />

        <ellipse class="map-shape" cx="190" cy="230" rx="130" ry="92" />
        <ellipse class="map-shape" cx="710" cy="180" rx="150" ry="105" />
        <ellipse class="map-shape" cx="455" cy="258" rx="190" ry="62" opacity="0.35" />

        <circle class="city-dot" cx="205" cy="220" r="6" />
        <circle class="city-dot" cx="710" cy="170" r="6" />

        <text class="label" x="148" y="248">Rwanda</text>
        <text class="label" x="618" y="200">Notre Dame, Indiana</text>

        <path class="route-line" d="M205,220 C350,120 540,120 710,170" />
        <text id="plane" class="plane" x="190" y="228">✈️</text>

        <!-- Small person -->
        <circle class="guy-head" cx="130" cy="350" r="16" />
        <rect class="guy-body" x="116" y="366" width="28" height="42" rx="8" />
        <line x1="116" y1="380" x2="95" y2="396" stroke="#78b4ff" stroke-width="6" stroke-linecap="round" />
        <line x1="144" y1="380" x2="178" y2="350" stroke="#78b4ff" stroke-width="6" stroke-linecap="round" />
        <line x1="124" y1="408" x2="112" y2="420" stroke="#78b4ff" stroke-width="6" stroke-linecap="round" />
        <line x1="137" y1="408" x2="154" y2="420" stroke="#78b4ff" stroke-width="6" stroke-linecap="round" />

        <!-- Big pen in hand -->
        <g transform="rotate(-18 210 325)">
          <rect class="pen" x="160" y="318" width="170" height="16" rx="8" />
          <polygon class="pen" points="330,326 352,322 352,330" fill="#ffe8b5" />
        </g>

        <!-- Pen direction marker -->
        <text class="label" x="364" y="334">Visit: https://10124.vercel.app</text>
      </svg>
    </div>

    <a class="cta" href="https://10124.vercel.app" target="_blank" rel="noopener noreferrer">
      Open Personal Website
      <span aria-hidden="true">↗</span>
    </a>
  </main>
</body>
</html>
