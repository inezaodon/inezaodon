<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ineza Odon</title>
  <style>
    :root {
      --bg: #05070b;
      --grid: rgba(130, 151, 186, 0.12);
      --text: #f3f6ff;
      --glow: #23e9ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      overflow: hidden;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 52px 52px;
      background-position: -1px -1px;
      padding: 0 8vw;
    }

    .hero-copy h1 {
      font-size: clamp(2.5rem, 7vw, 5.6rem);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .hero-visual {
      display: grid;
      place-items: center;
    }

    .globe {
      width: min(560px, 92%);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(140% 120% at 15% 18%, rgba(33, 118, 255, 0.55) 0%, rgba(7, 19, 50, 0.65) 45%, rgba(2, 8, 24, 0.95) 100%),
        radial-gradient(95% 95% at 74% 28%, rgba(54, 167, 255, 0.32) 0%, transparent 70%);
      border: 2px solid rgba(169, 205, 255, 0.78);
      box-shadow:
        0 0 0 6px rgba(110, 155, 255, 0.1),
        0 0 48px rgba(57, 156, 255, 0.45),
        inset -80px -20px 140px rgba(0, 0, 0, 0.58);
      animation: float 7s ease-in-out infinite;
    }

    .globe::before,
    .globe::after {
      content: "";
      position: absolute;
      border: 3px solid var(--glow);
      border-radius: 50%;
      filter: drop-shadow(0 0 8px rgba(35, 233, 255, 0.85));
      opacity: 0.95;
    }

    .globe::before {
      width: 130%;
      height: 38%;
      left: -15%;
      top: 33%;
      transform: rotate(-8deg);
      animation: orbitOne 5s linear infinite;
    }

    .globe::after {
      width: 90%;
      height: 140%;
      left: 5%;
      top: -20%;
      transform: rotate(24deg);
      animation: orbitTwo 7s linear infinite;
    }

    @keyframes orbitOne {
      to { transform: rotate(352deg); }
    }

    @keyframes orbitTwo {
      to { transform: rotate(384deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 44px;
        padding-top: 10vh;
        padding-bottom: 10vh;
      }
      .hero-copy {
        text-align: center;
      }
      .hero-visual {
        order: -1;
      }
      .globe {
        width: min(420px, 86vw);
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-copy">
      <h1>Ineza Odon</h1>
    </div>
    <div class="hero-visual" aria-hidden="true">
      <div class="globe"></div>
    </div>
  </main>
</body>
</html>
