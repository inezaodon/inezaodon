<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ineza Odon</title>
  <style>
    :root {
      --bg: #06080d;
      --text: #edf2ff;
      --muted: #94a1bd;
      --line: rgba(180, 202, 255, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 8, 13, 0.82);
      backdrop-filter: blur(10px);
    }

    .mark {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .socials {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .socials a {
      color: var(--muted);
      text-decoration: none;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 120ms ease;
    }

    .socials a:hover {
      color: var(--text);
    }

    .split {
      display: flex;
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      min-height: calc(100vh - 64px);
    }

    .left {
      flex: 1 1 50%;
      min-width: 0;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
      padding: 24px 16px;
      background-image:
        linear-gradient(rgba(133, 154, 190, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(133, 154, 190, 0.12) 1px, transparent 1px);
      background-size: 52px 52px;
      background-position: -1px -1px;
    }

    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(80% 95% at 50% 52%, transparent 50%, rgba(6, 8, 13, 0.74) 100%);
      pointer-events: none;
    }

    .name {
      position: relative;
      z-index: 1;
      font-size: clamp(3rem, 7.4vw, 6rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.04;
      text-align: center;
      padding: 0 22px;
      text-wrap: balance;
    }

    .cta {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d6e5ff;
      text-decoration: none;
      border: 1px solid rgba(155, 189, 255, 0.42);
      background: rgba(132, 171, 255, 0.12);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .cta:hover {
      border-color: rgba(187, 213, 255, 0.72);
      background: rgba(132, 171, 255, 0.2);
      transform: translateY(-1px);
    }

    #globe-wrap {
      flex: 1 1 50%;
      min-width: 0;
      position: relative;
      z-index: 2;
      height: calc(100vh - 64px);
      min-height: 280px;
      border-left: 1px solid var(--line);
      background: radial-gradient(95% 120% at 50% 52%, rgba(20, 37, 68, 0.35), rgba(6, 8, 13, 0.94) 62%);
      touch-action: none;
    }

    #globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
      vertical-align: top;
    }

    @media (max-width: 980px) {
      .topbar {
        padding: 0 16px;
      }
      .split {
        flex-direction: column;
      }
      .left {
        min-height: 48vh;
      }
      #globe-wrap {
        flex: none;
        width: 100%;
        height: min(52vh, 520px);
        border-left: none;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="mark">IO</div>
    <div class="socials">
      <a href="https://10124.vercel.app" aria-label="Website" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18"></path><path d="M12 3a15 15 0 0 1 0 18"></path><path d="M12 3a15 15 0 0 0 0 18"></path>
        </svg>
      </a>
    </div>
  </header>

  <div class="split">
    <main class="left">
      <div style="text-align:center;">
        <h1 class="name">Ineza Odon</h1>
        <a class="cta" href="https://10124.vercel.app" target="_blank" rel="noopener noreferrer">
          Open my portfolio website: 10124.vercel.app
        </a>
      </div>
    </main>
    <div id="globe-wrap" aria-hidden="true">
      <canvas id="globe-canvas"></canvas>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const wrap = document.getElementById("globe-wrap");
    const canvas = document.getElementById("globe-canvas");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
    // Start farther back so the globe sits deeper.
    camera.position.set(0, 0.25, 6.1);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 3.6;
    controls.maxDistance = 9.5;
    controls.rotateSpeed = 0.6;
    controls.zoomSpeed = 0.9;

    const ambient = new THREE.AmbientLight(0x97b8ff, 0.65);
    const key = new THREE.DirectionalLight(0xb7deff, 1.6);
    key.position.set(4, 3, 3);
    const rim = new THREE.DirectionalLight(0x2de7ff, 1.15);
    rim.position.set(-5, 1.5, -2.5);
    scene.add(ambient, key, rim);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const textureLoader = new THREE.TextureLoader();
    const texBase = "https://threejs.org/examples/textures/planets/";
    const normalMap = textureLoader.load(texBase + "earth_normal_2048.jpg");
    const specMap = textureLoader.load(texBase + "earth_specular_2048.jpg");
    const cloudMap = textureLoader.load(texBase + "earth_clouds_1024.png");

    [normalMap, specMap, cloudMap].forEach((t) => {
      t.colorSpace = THREE.NoColorSpace;
      t.anisotropy = 8;
    });

    const globeMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0x1e5a8a),
      roughness: 0.9,
      metalness: 0.02,
      emissive: new THREE.Color(0x091a40),
      emissiveIntensity: 0.18,
      normalMap,
      metalnessMap: specMap
    });

    const cloudMat = new THREE.MeshPhongMaterial({
      map: cloudMap,
      transparent: true,
      opacity: 0.36,
      depthWrite: false,
      color: 0xffffff
    });

    const onTexError = () => {
      globeMat.map = null;
      globeMat.normalMap = null;
      globeMat.metalnessMap = null;
      globeMat.color = new THREE.Color(0x1e5a8a);
      cloudMat.map = null;
      cloudMat.opacity = 0.12;
    };

    const colorMap = textureLoader.load(
      texBase + "earth_atmos_2048.jpg",
      undefined,
      undefined,
      onTexError
    );
    colorMap.colorSpace = THREE.SRGBColorSpace;
    colorMap.anisotropy = 8;
    globeMat.map = colorMap;
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1.42, 96, 96), globeMat);
    globeGroup.add(globe);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x8bbaff, transparent: true, opacity: 0.2 })
    );
    globeGroup.add(atmosphere);

    const cloudLayer = new THREE.Mesh(new THREE.SphereGeometry(1.465, 96, 96), cloudMat);
    globeGroup.add(cloudLayer);

    function makeOrbit(radius, tiltX, tiltY, color) {
      const curve = new THREE.EllipseCurve(0, 0, radius, radius * 0.42, 0, Math.PI * 2, false, 0);
      const points = curve.getPoints(240).map((p) => new THREE.Vector3(p.x, p.y, 0));
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.LineLoop(
        geo,
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 })
      );
      line.rotation.x = tiltX;
      line.rotation.y = tiltY;
      globeGroup.add(line);
      return line;
    }

    const orbitA = makeOrbit(2.03, 1.16, 0.38, 0x22eaff);
    const orbitB = makeOrbit(1.96, 0.44, -0.74, 0x1fd8ff);
    const orbitC = makeOrbit(2.11, -0.08, 0.98, 0x48efff);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 220;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i += 1) {
      const i3 = i * 3;
      starPos[i3] = (Math.random() - 0.5) * 24;
      starPos[i3 + 1] = (Math.random() - 0.5) * 18;
      starPos[i3 + 2] = -2 - Math.random() * 8;
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0x9fc7ff, size: 0.03, transparent: true, opacity: 0.8 })
    );
    scene.add(stars);

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener("resize", resize);
    if (typeof ResizeObserver !== "undefined") {
      const ro = new ResizeObserver(() => resize());
      ro.observe(wrap);
    }
    requestAnimationFrame(() => resize());

    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();
      globe.rotation.y += 0.00125;
      globe.rotation.x = Math.sin(t * 0.22) * 0.05;
      cloudLayer.rotation.y += 0.00185;
      orbitA.rotation.z = t * 0.44;
      orbitB.rotation.z = -t * 0.35;
      orbitC.rotation.z = t * 0.28;
      globeGroup.position.y = Math.sin(t * 0.8) * 0.06;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
