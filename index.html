<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ineza Odon</title>
  <style>
    :root {
      --bg: #06080d;
      --text: #edf2ff;
      --muted: #94a1bd;
      --line: rgba(180, 202, 255, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 8, 13, 0.82);
      backdrop-filter: blur(10px);
    }

    .mark {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .socials {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .socials a {
      color: var(--muted);
      text-decoration: none;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 120ms ease;
    }

    .socials a:hover {
      color: var(--text);
    }

    .layout {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
    }

    .left {
      width: 100%;
      min-height: calc(100vh - 64px);
      display: grid;
      place-items: center;
      position: relative;
      background-image:
        linear-gradient(rgba(133, 154, 190, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(133, 154, 190, 0.12) 1px, transparent 1px);
      background-size: 52px 52px;
      background-position: -1px -1px;
    }

    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(80% 95% at 50% 52%, transparent 50%, rgba(6, 8, 13, 0.74) 100%);
      pointer-events: none;
    }

    .name {
      position: relative;
      z-index: 1;
      font-size: clamp(3rem, 7.4vw, 6rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.04;
      text-align: center;
      padding: 0 22px;
      text-wrap: balance;
    }

    #globe-wrap {
      position: fixed;
      top: 64px;
      right: 0;
      width: 50vw;
      height: calc(100vh - 64px);
      min-width: 560px;
      border-left: 1px solid var(--line);
      background: radial-gradient(95% 120% at 50% 52%, rgba(20, 37, 68, 0.3), rgba(6, 8, 13, 0.92) 60%);
    }

    #globe-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 980px) {
      .topbar {
        padding: 0 16px;
      }
      .layout {
        display: block;
      }
      #globe-wrap {
        position: relative;
        top: 0;
        width: 100%;
        height: 46vh;
        min-width: 0;
        border-left: none;
        border-top: 1px solid var(--line);
      }
      .left {
        min-height: 52vh;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="mark">IO</div>
    <div class="socials">
      <a href="https://10124.vercel.app" aria-label="Website" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18"></path><path d="M12 3a15 15 0 0 1 0 18"></path><path d="M12 3a15 15 0 0 0 0 18"></path>
        </svg>
      </a>
    </div>
  </header>

  <div class="layout">
    <main class="left">
      <h1 class="name">Ineza Odon</h1>
    </main>
  </div>

  <div id="globe-wrap" aria-hidden="true">
    <canvas id="globe-canvas"></canvas>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const wrap = document.getElementById("globe-wrap");
    const canvas = document.getElementById("globe-canvas");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    camera.position.set(0, 0.2, 4.3);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const ambient = new THREE.AmbientLight(0x8ab6ff, 0.8);
    const key = new THREE.DirectionalLight(0x9ed6ff, 1.5);
    key.position.set(4, 3, 3);
    const rim = new THREE.DirectionalLight(0x2de7ff, 1.2);
    rim.position.set(-5, 1.5, -2.5);
    scene.add(ambient, key, rim);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Draw simple continent-like patches on a generated texture.
    const texCanvas = document.createElement("canvas");
    texCanvas.width = 1024;
    texCanvas.height = 512;
    const ctx = texCanvas.getContext("2d");
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, "#0d2f6f");
    grad.addColorStop(0.5, "#0a2558");
    grad.addColorStop(1, "#07173a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1024, 512);
    ctx.fillStyle = "rgba(76, 154, 117, 0.62)";
    for (let i = 0; i < 18; i += 1) {
      const x = Math.random() * 1024;
      const y = Math.random() * 512;
      const rx = 45 + Math.random() * 110;
      const ry = 18 + Math.random() * 65;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }

    const colorMap = new THREE.CanvasTexture(texCanvas);
    colorMap.anisotropy = 8;

    const globeMat = new THREE.MeshStandardMaterial({
      map: colorMap,
      roughness: 0.8,
      metalness: 0.05,
      emissive: new THREE.Color(0x0b1f4b),
      emissiveIntensity: 0.32
    });
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1.42, 96, 96), globeMat);
    globeGroup.add(globe);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x8bbaff, transparent: true, opacity: 0.2 })
    );
    globeGroup.add(atmosphere);

    function makeOrbit(radius, tiltX, tiltY, color) {
      const curve = new THREE.EllipseCurve(0, 0, radius, radius * 0.42, 0, Math.PI * 2, false, 0);
      const points = curve.getPoints(240).map((p) => new THREE.Vector3(p.x, p.y, 0));
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.LineLoop(
        geo,
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 })
      );
      line.rotation.x = tiltX;
      line.rotation.y = tiltY;
      globeGroup.add(line);
      return line;
    }

    const orbitA = makeOrbit(2.03, 1.16, 0.38, 0x22eaff);
    const orbitB = makeOrbit(1.96, 0.44, -0.74, 0x1fd8ff);
    const orbitC = makeOrbit(2.11, -0.08, 0.98, 0x48efff);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 220;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i += 1) {
      const i3 = i * 3;
      starPos[i3] = (Math.random() - 0.5) * 24;
      starPos[i3 + 1] = (Math.random() - 0.5) * 18;
      starPos[i3 + 2] = -2 - Math.random() * 8;
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0x9fc7ff, size: 0.03, transparent: true, opacity: 0.8 })
    );
    scene.add(stars);

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener("resize", resize);

    const clock = new THREE.Clock();
    function animate() {
      const t = clock.getElapsedTime();
      globe.rotation.y += 0.0018;
      globe.rotation.x = Math.sin(t * 0.22) * 0.05;
      orbitA.rotation.z = t * 0.44;
      orbitB.rotation.z = -t * 0.35;
      orbitC.rotation.z = t * 0.28;
      globeGroup.position.y = Math.sin(t * 0.8) * 0.06;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
